<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TEI with CETEIcean Exp 1</title>
  <link rel="stylesheet" href="CETEIcean.css">
</head>
<body>

  <!-- This is where the TEI will be inserted -->
  <div id="TEI"></div>


  <!-- CETEICean rendering-->
  <script src="CETEI.js"></script>
  <script>
    var CETEIcean = new CETEI()

    // Adds hover and link for corrections
    CETEIcean.addBehaviors({
      tei: {
        choice: function(e) {
          const sic = e.querySelector("tei-sic");
          const corr = e.querySelector("tei-corr");
          if (!sic || !corr) return;

          const span = document.createElement("span");
          span.className = "tei-choice-hover";
          span.textContent = sic.textContent;

          // store correction safely (not rendered inline)
          span.setAttribute("data-corr", "Correction: " + corr.textContent);

          return span;
        }
      }
    });

    CETEIcean.getHTML5("11_PV_Vorrede_pres.xml", function(data) {
      document.getElementById("TEI").appendChild(data)
    })


    window.addEventListener("DOMContentLoaded", initPageNavigation);
  </script>

</body>
</html>
